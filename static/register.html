<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Parkinson's Diagnostic</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            background: #1e1e1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 2rem;
        }

        .form-card {
            background: #2d2d2d;
            border-radius: 28px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid #3d3d3d;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-card h2 {
            text-align: center;
            margin-bottom: 2rem;
            color: white;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: #252525;
            border: 1px solid #3d3d3d;
            border-radius: 20px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4a6fa5;
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.2);
        }

        .form-group input::placeholder {
            color: #666;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            background: #4a6fa5;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #5a7fb5;
            transform: translateY(-2px);
        }

        .form-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #888;
        }

        .form-footer a {
            color: white;
            text-decoration: none;
        }

        .form-footer a:hover {
            color: #aaa;
            text-decoration: underline;
        }

        .error-msg {
            color: #d9534f;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-card">
            <h2>📝 Регистрация</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Имя пользователя *</label>
                    <input type="text" id="username" required placeholder="Введите имя пользователя">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label>Пароль *</label>
                    <input type="password" id="password" required placeholder="Введите пароль">
                </div>
                <div class="form-group">
                    <label>Полное имя</label>
                    <input type="text" id="full_name" placeholder="Иванов Иван Иванович">
                </div>
                <div class="form-group">
                    <label>Возраст</label>
                    <input type="number" id="age" placeholder="Например: 65">
                </div>
                <button type="submit" class="btn-primary">Зарегистрироваться</button>
            </form>
            <p class="form-footer">Уже есть аккаунт? <a href="/login">Войти</a></p>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                full_name: document.getElementById('full_name').value,
                age: parseInt(document.getElementById('age').value) || null
            };

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    const resData = await res.json();
                    localStorage.setItem('token', resData.access_token);
                    localStorage.setItem('userId', resData.user_id);
                    localStorage.setItem('username', data.username);
                    window.location.href = '/dashboard';
                } else {
                    const error = await res.json();
                    document.getElementById('errorMsg').textContent = error.detail;
                }
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'Ошибка соединения с сервером';
            }
        });
    </script>
</body>
</html>
